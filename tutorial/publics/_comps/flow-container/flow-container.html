<template component>
  <style>
    :host {
      position: relative;
      display: block;
      overflow: hidden;
    }
    ::slotted(*) {
      position: absolute;
      white-space: nowrap;
    }
    ::slotted(*:hover) {
      animation-play-state: paused !important;
      z-index: 3;
    }
  </style>
  <inject-host>
    <style>
      flow-container > * {
        opacity: 0;
      }

      @keyframes flow-container-float {
        0% {
          transform: translateX(100vw);
          opacity: 0;
        }
        10% {
          opacity: 1;
        }
        90% {
          opacity: 1;
        }
        100% {
          transform: translateX(-100%);
          opacity: 0;
        }
      }
    </style>
  </inject-host>
  <slot></slot>
  <script>
    export default async ({ load }) => {
      return {
        tag: "flow-container",
        data: {},
        attached() {
          this.startDanmu();
        },
        proto: {
          startDanmu() {
            const children = Array.from(this);
            if (children.length === 0) return;

            const hostHeight = this.offsetHeight || 300;
            const duration = 15 + Math.random() * 5;

            // 打乱顺序
            children.sort(() => Math.random() - 0.5);

            children.forEach((el, index) => {
              const y = Math.random() * (hostHeight - 50);
              const delay = index === 0 ? 0 : index * 2;
              const duration = 15 + Math.random() * 10;

              el.style.top = `${y}px`;
              el.style.animation = `flow-container-float ${duration}s linear ${delay}s infinite`;
            });
          },
        },
      };
    };
  </script>
</template>
