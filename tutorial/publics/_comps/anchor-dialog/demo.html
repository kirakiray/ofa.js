<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>anchor-dialog</title>

  <body>
    <l-m src="./anchor-dialog.html"></l-m>

      <button id="haha">Click Me</button>

        </article>
