<article class="markdown-body">
  <h1>API 文档</h1>
  <p>
    ofa.js 不仅支持模板语法，还提供丰富的 API 来直接操作 DOM。就像
    <a href="https://jquery.com/">jQuery</a>
    一样，你可以用简洁的 ofa.js 语法替代冗长的原生 JavaScript，轻松完成 DOM
    操作。
  </p>
  <p>
    在组件或页面模块的生命周期函数及自定义方法中，你都可以随时调用 ofa.js 提供的
    API，灵活高效地操控 DOM 元素。
  </p>
  <div style="display: flex; flex-wrap: wrap">
    <api-list>
      <h3>实例相关</h3>
      <api-item>
        <a href="./instance/dollar.md">$(selector)</a>
        <p>
          <code>$</code>方法是 ofa.js 中的核心函数，用于获取和操作 DOM 元素实例
        </p>
      </api-item>
      <api-item>
        <a href="./instance/all.md">all</a>
        <p><code>all</code>方法用于获取当前元素的所有子元素实例</p>
      </api-item>
      <api-item>
        <a href="./instance/ele.md">ele</a>
        <p><code>ele</code>方法用于获取当前元素的子元素实例</p>
      </api-item>
    </api-list>
  </div>
</article>
