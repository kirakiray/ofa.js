<template component>
  <style>
    :host {
      display: block;
      width: 300px;
      border-right: 1px solid #e0e0e0;
      overflow: auto;
      padding: 20px;
      background: #fafafa;
    }
    .dir-item {
      margin-bottom: 5px;
    }
    .dir-toggle {
      cursor: pointer;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .dir-toggle:hover {
      background: #e0e0e0;
    }
    .dir-toggle::before {
      content: "▶";
      font-size: 10px;
      transition: transform 0.2s;
    }
    .dir-toggle.opened::before {
      transform: rotate(90deg);
    }
    .file-item {
      padding-left: 14px;
      cursor: pointer;
      border-radius: 4px;
    }
    .file-item:hover {
      background: #e0e0e0;
    }
    .file-item.active {
      background: #007bff;
      color: white;
    }
  </style>

  <o-fill :value="filelist.children" name="file-tree"> </o-fill>

  <template name="file-tree">
    <div>
      <o-if :value="$data.type === 'dir'">
        <div class="dir-item">
          <div
            class="dir-toggle"
            class:opened="$data.opened"
            on:click="$host.toggle($data,$event)"
          >
            <span>{{$data.name}}</span>
          </div>
          <div
            style="padding-left: 20px"
            :style.display="$data.opened ? 'block' : 'none'"
          >
            <o-if :value="$data.children.length > 0">
              <o-fill :value="$data.children" name="file-tree"></o-fill>
            </o-if>
            <o-else>
              <div style="color: #aaa; padding: 5px 10px; font-size: 12px">
                (empty)
              </div>
            </o-else>
          </div>
        </div>
      </o-if>
      <o-else-if :value="$data.type === 'file'">
        <div class="file-item" on:click="$host.selectFile($data)">
          {{$data.name}}
        </div>
      </o-else-if>
    </div>
  </template>

  <script>
    export default async ({ load }) => {
      const { fileData } = await load("./data.js");

      return {
        tag: "file-list",
        data: {
          filelist: fileData,
        },
        proto: {
          toggle(data, event) {
            event.stopPropagation();
            data.opened = !data.opened;
          },
          selectFile(file) {
            const provider = this.getProvider("project-data");
            provider.activePath = file.path;
          },
        },
      };
    };
  </script>
</template>
