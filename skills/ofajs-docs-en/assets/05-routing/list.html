<template page>
  <style>
    :host {
      display: block;
    }
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .tab {
      padding: 10px 20px;
      border: 1px solid #ddd;
      border-radius: 4px;
      cursor: pointer;
    }
    .tab.active {
      background: #007bff;
      color: #fff;
      border-color: #007bff;
    }
    .tab a {
      color: inherit;
      text-decoration: none;
    }
    h2 {
      color: #333;
      margin-bottom: 15px;
    }
  </style>
  <h2>商品列表</h2>
  <div class="tabs">
    <div class="tab" class:active="subActive === 'page1'">
      <a href="./list-page1.html" olink>推荐商品</a>
    </div>
    <div class="tab" class:active="subActive === 'page2'">
      <a href="./list-page2.html" olink>热门商品</a>
    </div>
  </div>
  <slot></slot>
  <script>
    export const parent = "./layout.html";
    export default async () => {
      return {
        data: {
          subActive: 'page1',
        },
        routerChange() {
          this.refreshSubActive();
        },
        ready() {
          this.refreshSubActive();
        },
        proto: {
          refreshSubActive() {
            const { current } = this.app;
            const path = new URL(current.src).pathname;
            this.subActive = path.includes('page1') ? 'page1' : 'page2';
          },
        },
      };
    };
  </script>
</template>
