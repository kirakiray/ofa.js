<template component>
  <style>
    :host {
      display: block;
      flex: 1;
      padding: 20px;
      overflow: auto;
    }
    .placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #888;
      font-size: 18px;
    }
    .editor-content {
      font-family: "Courier New", monospace;
      white-space: pre-wrap;
      line-height: 1.6;
    }
    .file-name {
      font-size: 14px;
      color: #666;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 1px solid #e0e0e0;
    }
  </style>

  <o-if :value="activePath"> {{fileContent}} </o-if>
  <o-else>
    <div class="placeholder">编辑器区域（等待联动效果）</div>
  </o-else>

  <o-consumer name="project-data" watch:active-path="activePath"></o-consumer>

  <script>
    export default async ({ load }) => {
      const { getContent } = await load("./data.js");

      return {
        tag: "file-editor",
        data: {
          activePath: null,
          fileContent: "",
        },
        watch: {
          async activePath(path) {
            if (!path) {
              return;
            }

            this.fileContent = await getContent(path);
          },
        },
      };
    };
  </script>
</template>
