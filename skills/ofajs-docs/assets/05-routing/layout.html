  <style>
    :host {
      display: block;
      height: 100%;

    .container {
      display: flex;
      flex-direction: column;
      height: 100%;
    }
    header {
      padding: 15px 20px;
      background: #333;
      color: #fff;
    }
    nav ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      gap: 20px;
    }
    nav li {
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s;
    }
    nav li:hover {
      background: #555;
    }
    nav li.active {
      background: #007bff;
    }
    nav li a {
      color: inherit;
      text-decoration: none;

    .main {
      flex: 1;

  </style>
  <div class="container">
    <header>
      <nav>
        <ul>
          <li class:active="active1">
            <a href="./home.html" olink>首页</a>
          </li>
          <li class:active="active2">
            <a href="./list.html" olink>列表</a>
          </li>
          <li class:active="active3">
            <a href="./detail.html?id=1" olink>详情</a>
          </li>
        </ul>
      </nav>
    </header>
    <div class="main">
      <slot></slot>
    </div>
  </div>
  <script>
    export default () => {
      return {
        data: {
          active1: false,
          active2: false,
          active3: false,
        },
        routerChange() {
          this.refreshActive();
        },
        ready() {
          this.refreshActive();
        },
        proto: {
          refreshActive() {
            const { current } = this.app;
            const path = new URL(current.src).pathname;
            this.active1 = path.endsWith('home.html');
            this.active2 = path.includes('list');
            this.active3 = path.includes('detail');
          },
        },
      };
    };
  </script>
