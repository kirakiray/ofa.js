<template page>
  <style>
    :host {
      display: block;
    }
    h2 {
      color: #333;
      margin-bottom: 20px;
    }
    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    input[type="text"] {
      flex: 1;
      padding: 10px 15px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
    }
    button {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      background: #007bff;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover {
      background: #0056b3;
    }
    .todo-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .todo-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 15px;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      margin-bottom: 10px;
      background: #fafafa;
    }
    .todo-item.completed {
      background: #e8f5e9;
      border-color: #c8e6c9;
    }
    .todo-item.completed .todo-text {
      text-decoration: line-through;
      color: #888;
    }
    .todo-text {
      flex: 1;
    }
    .delete-btn {
      padding: 5px 10px;
      background: #dc3545;
      font-size: 12px;
    }
    .delete-btn:hover {
      background: #c82333;
    }
    .empty-tip {
      text-align: center;
      color: #888;
      padding: 40px;
    }
  </style>

  <h2>Todo List</h2>

  <div class="input-row">
    <input
      type="text"
      sync:value="inputText"
      placeholder="输入待办事项..."
      on:keydown="handleKeydown"
    />
    <button on:click="addTodo">添加</button>
  </div>

  <o-if :value="todos.length === 0">
    <p class="empty-tip">暂无待办事项，添加一个吧~</p>
  </o-if>
  <o-else-if :value="remainingCount === 0">
    <p class="empty-tip">所有任务都已完成！🎉</p>
  </o-else-if>
  <o-else>
    <p style="color: #666; margin-bottom: 10px">
      共 {{todos.length}} 项任务，还有 {{remainingCount}} 项未完成
    </p>
    <ul class="todo-list">
      <o-fill :value="todos">
        <li class="todo-item" class:completed="$data.completed">
          <input
            type="checkbox"
            :checked="$data.completed"
            on:change="$host.toggleTodo($data,$index)"
          />
          <span class="todo-text">{{$data.text}}</span>
          <button class="delete-btn" on:click="$host.deleteTodo($index)">
            删除
          </button>
        </li>
      </o-fill>
    </ul>
  </o-else>

  <script>
    export default async () => {
      return {
        data: {
          todos: [],
          inputText: "",
          storageKey: "ofa-todolist-demo",
        },
        attached() {
          const stored = localStorage.getItem(this.storageKey);
          if (stored) {
            try {
              this.todos = JSON.parse(stored);
            } catch (e) {
              console.error("Failed to parse stored todos:", e);
            }
          }
        },
        proto: {
          saveTodos() {
            localStorage.setItem(this.storageKey, JSON.stringify(this.todos));
          },
          addTodo() {
            const text = this.inputText.trim();
            if (!text) return;
            this.todos.push({ text, completed: false });
            this.inputText = "";
            this.saveTodos();
          },
          handleKeydown(e) {
            if (e.key === "Enter") {
              this.addTodo();
            }
          },
          toggleTodo(data, index) {
            // const data = this.todos[index];
            data.completed = !data.completed;
            this.saveTodos();
          },
          deleteTodo(index) {
            this.todos.splice(index, 1);
            this.saveTodos();
          },
          get remainingCount() {
            return this.todos.filter((t) => !t.completed).length;
          },
        },
      };
    };
  </script>
</template>
