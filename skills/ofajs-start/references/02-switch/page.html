<template page>
  <!-- 引入组件 -->
  <l-m src="./switch.html"></l-m>

  <style>
    :host {
      display: block;
    }
  </style>

  <style>
    h2 {
      color: #333;
      margin-bottom: 20px;
    }
    .demo-section {
      margin-bottom: 30px;
      padding: 20px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      background: #fafafa;
    }
    .demo-section h3 {
      margin-top: 0;
      color: #666;
      font-size: 14px;
      margin-bottom: 15px;
    }
    .demo-row {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 15px;
    }
    .demo-row:last-child {
      margin-bottom: 0;
    }
    .status-text {
      font-size: 14px;
      color: #666;
    }
  </style>

  <h2>Switch 开关组件演示</h2>

  <!-- 基础用法 -->
  <div class="demo-section">
    <h3>基础用法</h3>
    <div class="demo-row">
      <ofa-switch></ofa-switch>
      <span class="status-text">默认关闭</span>
    </div>
    <div class="demo-row">
      <ofa-switch :checked="true"></ofa-switch>
      <span class="status-text">默认开启</span>
    </div>
  </div>

  <!-- 带标签 -->
  <div class="demo-section">
    <h3>带标签</h3>
    <div class="demo-row">
      <ofa-switch>启用通知</ofa-switch>
    </div>
    <div class="demo-row">
      <ofa-switch :checked="true">自动保存</ofa-switch>
    </div>
  </div>

  <!-- 双向绑定 -->
  <div class="demo-section">
    <h3>双向绑定</h3>
    <div class="demo-row">
      <ofa-switch sync:checked="switchState"></ofa-switch>
      <span class="status-text"
        >当前状态: {{switchState ? '开启' : '关闭'}}</span
      >
    </div>
  </div>

  <!-- 禁用状态 -->
  <div class="demo-section">
    <h3>禁用状态</h3>
    <div class="demo-row">
      <ofa-switch disabled></ofa-switch>
      <span class="status-text">禁用状态（关闭）</span>
    </div>
    <div class="demo-row">
      <ofa-switch :checked="true" disabled></ofa-switch>
      <span class="status-text">禁用状态（开启）</span>
    </div>
  </div>

  <!-- 事件监听 -->
  <div class="demo-section">
    <h3>事件监听</h3>
    <div class="demo-row">
      <ofa-switch on:change="handleSwitchChange"></ofa-switch>
      <span class="status-text">点击次数: {{clickCount}}</span>
    </div>
  </div>

  <script>
    export default async () => {
      return {
        data: {
          switchState: false,
          clickCount: 0,
        },
        proto: {
          handleSwitchChange(e) {
            this.clickCount++;
            console.log("Switch changed:", e.data.checked);
          },
        },
      };
    };
  </script>
</template>
